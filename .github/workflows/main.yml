name: Aviation Forecast Salvage

on:
  schedule:
    # 日本時間の毎時0分（世界標準時の毎時0分）に自動実行
    - cron: '0 * * * *'
  # GitHubの画面から「Run workflow」ボタンで手動実行も可能にする設定
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # GitHubリポジトリへの書き込み権限を明示的に許可
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run auto salvage script
        # ここで最新のスクリプト名「auto_salvage.py」を指定しています
        run: python auto_salvage.py

      - name: Commit and Push changes
        # 取得したデータをリポジトリに保存してプッシュ
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Auto-update weather data: $(date)" || exit 0
          git push
