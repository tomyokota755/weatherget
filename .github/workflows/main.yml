name: Aviation Forecast Salvage

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'  # 日本時間 09:30, 15:30, 21:30, 03:30
  workflow_dispatch:              # 手動実行スイッチ

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 書き込み権限を明示的に付与
    permissions:
      contents: write
      
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全履歴を取得（Rebaseに必要）

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run salvage script
        run: python fetch_forecasts.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 変更（画像ファイルなど）をステージング
          git add forecasts/
          
          # 変更がある場合のみ処理を実行
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update forecasts and charts [skip ci]"
            
            # サーバー側の最新状態を自分の後ろに繋ぎ直して競合を回避
            git pull --rebase origin main
            
            # 離陸（Push）
            git push origin main
          else
            echo "No changes to commit"
          fi
